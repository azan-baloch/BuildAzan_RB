name: Build & Deploy Spring Boot JAR to EC2

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-jar
          path: target/BuildAzan-*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-jar
          path: ./downloaded-jar

      # New connection test step
      - name: Test SSH Connection to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "✅ Successfully connected to EC2!"
            hostname
            pwd

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "downloaded-jar/BuildAzan-*.jar"
          target: "/home/ec2-user/app/"

      - name: Restart application on EC2
        uses: appleboy/ssh-action@v0.1.6
        env:
          SPRING_DATA_MONGODB_URI: ${{ secrets.SPRING_DATA_MONGODB_URI }}
          SPRING_DATA_MONGODB_DATABASE: ${{ secrets.SPRING_DATA_MONGODB_DATABASE }}
          SPRING_DATA_MONGODB_AUTO_INDEX_CREATION: ${{ secrets.SPRING_DATA_MONGODB_AUTO_INDEX_CREATION }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eux
            # Kill previous process
            pkill -f 'java -jar /home/ec2-user/app/BuildAzan-.*.jar' || true
            sleep 3
            # Start new JAR
            nohup java -jar /home/ec2-user/app/BuildAzan-*.jar > /home/ec2-user/app/app.log 2>&1 &
