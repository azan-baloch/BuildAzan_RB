name: CI/CD → Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Build the Spring Boot JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5️⃣ Install Elastic Beanstalk CLI
      - name: Install Elastic Beanstalk CLI
        run: |
          pip install --upgrade pip
          pip install awsebcli

      # 6️⃣ Initialize EB CLI (without explicit platform to let EB detect Java 17)
      - name: Initialize EB CLI
        run: |
          eb init ${{ secrets.EB_APP_NAME }} --region ${{ secrets.AWS_REGION }} --verbose

      # 7️⃣ Select the EB environment
      - name: Use EB environment
        run: eb use ${{ secrets.EB_ENV_NAME }}

      # 8️⃣ Set EB environment variables
      - name: Set EB environment variables
        run: eb setenv \
          SPRING_DATA_MONGODB_URI=${{ secrets.SPRING_DATA_MONGODB_URI }} \
          SPRING_DATA_MONGODB_DATABASE=${{ secrets.SPRING_DATA_MONGODB_DATABASE }} \
          SPRING_DATA_MONGODB_AUTO_INDEX_CREATION=${{ secrets.SPRING_DATA_MONGODB_AUTO_INDEX_CREATION }} \
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }} \
          BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}

      # 9️⃣ Deploy the application
      - name: Deploy to Elastic Beanstalk
        run: eb deploy ${{ secrets.EB_ENV_NAME }} --staged
