name: Deploy Spring Boot to AWS Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-app
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: spring-app
          
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region:             ${{ secrets.AWS_REGION }}
          application_name:   ${{ secrets.EB_APP_NAME }}
          environment_name:   ${{ secrets.EB_ENV_NAME }}
          version_label:      build-${{ github.run_id }}
          deployment_package: **spring-app**/**/*.jar
          environment_variables: '{
            "SPRING_DATA_MONGODB_URI": "${{ secrets.SPRING_DATA_MONGODB_URI }}",
            "SPRING_DATA_MONGODB_DATABASE": "${{ secrets.SPRING_DATA_MONGODB_DATABASE }}",
            "BREVO_API_KEY": "${{ secrets.BREVO_API_KEY }}",
            "BREVO_SENDER_EMAIL": "${{ secrets.BREVO_SENDER_EMAIL }}"
          }'
